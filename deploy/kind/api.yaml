apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels: {app: api}
  template:
    metadata:
      labels: {app: api}
    spec:
      containers:
        - name: api
          image: price-scout-control-plane:dev
          imagePullPolicy: Never
          args: [api]
          envFrom:
            - configMapRef: {name: price-scout}
            - secretRef: {name: price-scout}
          ports:
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            periodSeconds: 10
          resources:
            requests: {cpu: 100m, memory: 96Mi}
            limits: {cpu: "1", memory: 512Mi}
          volumeMounts:
            - {name: artifacts, mountPath: /data/artifacts, readOnly: true}
      volumes:
        - name: artifacts
          persistentVolumeClaim: {claimName: artifacts}
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: {app: api}
  ports:
    - {name: http, port: 8080, targetPort: http}
