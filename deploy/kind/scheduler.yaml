apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  replicas: 1
  selector:
    matchLabels: {app: scheduler}
  template:
    metadata:
      labels: {app: scheduler}
    spec:
      containers:
        - name: scheduler
          image: price-scout-control-plane:dev
          imagePullPolicy: Never
          args: [scheduler]
          envFrom:
            - configMapRef: {name: price-scout}
            - secretRef: {name: price-scout}
          ports:
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            periodSeconds: 10
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
spec:
  selector: {app: scheduler}
  ports:
    - {name: http, port: 8080, targetPort: http}
