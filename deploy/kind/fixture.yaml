apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixture
spec:
  replicas: 1
  selector:
    matchLabels: {app: fixture}
  template:
    metadata:
      labels: {app: fixture}
    spec:
      containers:
        - name: fixture
          image: price-scout-fixture:dev
          imagePullPolicy: Never
          ports:
            - {name: http, containerPort: 4173}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            periodSeconds: 5
          resources:
            requests: {cpu: 20m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: fixture
spec:
  selector: {app: fixture}
  ports:
    - {name: http, port: 4173, targetPort: http}
