apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
spec:
  replicas: 1
  selector:
    matchLabels: {app: nats}
  template:
    metadata:
      labels: {app: nats}
    spec:
      containers:
        - name: nats
          image: nats:2.11-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - {name: client, containerPort: 4222}
            - {name: monitor, containerPort: 8222}
          readinessProbe:
            tcpSocket: {port: client}
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: nats-data}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector: {app: nats}
  ports:
    - {name: client, port: 4222, targetPort: client}
    - {name: monitor, port: 8222, targetPort: monitor}
