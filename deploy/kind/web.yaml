apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  selector:
    matchLabels: {app: web}
  template:
    metadata:
      labels: {app: web}
    spec:
      containers:
        - name: web
          image: price-scout-web:dev
          imagePullPolicy: Never
          ports:
            - {name: http, containerPort: 3000}
          readinessProbe:
            httpGet: {path: /, port: http}
            periodSeconds: 5
          resources:
            requests: {cpu: 20m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector: {app: web}
  ports:
    - {name: http, port: 80, targetPort: http}
